name: Publish NuGet Package

on:
  push:
    branches:
      - master
    paths:
      - 'AVMTradeReporter.Models/**'
      - '.github/workflows/publish-nuget.yml'
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required so this job can request a GitHub OIDC token for NuGet Trusted Publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute package version
        id: version
        run: |
          BASE_VERSION=$(grep -oPm1 "(?<=<Version>)[^<]+" AVMTradeReporter.Models/AVMTradeReporter.Models.csproj)
          BUILD_STAMP=$(date -u +'%Y%m%d%H')
          FULL_VERSION="${BASE_VERSION}.${BUILD_STAMP}"
          echo "Package version: $FULL_VERSION"
          echo "full_version=$FULL_VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore AVMTradeReporter.Models/AVMTradeReporter.Models.csproj

      # The project sets <GeneratePackageOnBuild>true</GeneratePackageOnBuild> (for local `dotnet
      # build` convenience), which makes `dotnet pack` skip its own Build step and assume the DLL
      # was already built. On a clean checkout there is no prior build, so pack fails with NU5026
      # ("file to be packed was not found on disk") unless we build explicitly first.
      #
      # AssemblyVersion/FileVersion are pinned separately from the package Version: those are
      # System.Version fields with UInt16 components (max 65535), so the yyyyMMddHH build stamp
      # (which fits NuGet's own Int32-per-component limit, see NUGET_PUBLISHING.md) overflows them
      # and fails the compile with CS7034 if left to default to Version.
      - name: Build
        run: >
          dotnet build AVMTradeReporter.Models/AVMTradeReporter.Models.csproj
          -c Release
          --no-restore
          -p:Version=${{ steps.version.outputs.full_version }}
          -p:AssemblyVersion=1.0.0.0
          -p:FileVersion=1.0.0.0

      - name: Pack
        run: >
          dotnet pack AVMTradeReporter.Models/AVMTradeReporter.Models.csproj
          -c Release
          --no-build
          -p:Version=${{ steps.version.outputs.full_version }}
          -p:AssemblyVersion=1.0.0.0
          -p:FileVersion=1.0.0.0
          -o ${{ github.workspace }}/nupkg

      # Exchanges a short-lived GitHub OIDC token for a temporary (1-hour) nuget.org API key,
      # per the Trusted Publishing policy configured on nuget.org for this repo/workflow.
      # No long-lived NUGET_API_KEY secret is needed or used anymore.
      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "${{ github.workspace }}/nupkg/*.nupkg"
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
